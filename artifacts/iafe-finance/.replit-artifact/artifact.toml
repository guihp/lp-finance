kind = "web"
previewPath = "/"
title = "IAFÉ Finance"
version = "1.0.0"
id = "artifacts/iafe-finance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22153

[services.development]
run = "pnpm --filter @workspace/iafe-finance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/iafe-finance", "run", "build" ]
publicDir = "artifacts/iafe-finance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22153"
BASE_PATH = "/"
